name: Sync Template to Connected Repos

on:
  push:
    branches:
      - main
    paths: # Only trigger if a synced file actually changed
      - '.github/workflows/deploy.yml'
      - '.cursor/rules/hayc-config.mdc'
      - 'scripts/pull-config.ts'
      - 'tsconfig.json'
      - 'tsconfig.app.json'
      - 'tsconfig.node.json'
      - 'tsconfig.scripts.json'
      - 'postcss.config.js'
      - 'eslint.config.js'
      - 'components.json'
      - 'src/hayc/config-context.tsx'
      - 'src/components/LanguageSwitcher.tsx'
      - 'src/components/Preloader.tsx'
      - 'src/components/ScrollToTop.tsx'
      - 'src/components/ui/accordion.tsx'
      - 'src/components/ui/alert.tsx'
      - 'src/components/ui/alert-dialog.tsx'
      - 'src/components/ui/aspect-ratio.tsx'
      - 'src/components/ui/avatar.tsx'
      - 'src/components/ui/badge.tsx'
      - 'src/components/ui/breadcrumb.tsx'
      - 'src/components/ui/button.tsx'
      - 'src/components/ui/button-group.tsx'
      - 'src/components/ui/calendar.tsx'
      - 'src/components/ui/card.tsx'
      - 'src/components/ui/carousel.tsx'
      - 'src/components/ui/chart.tsx'
      - 'src/components/ui/checkbox.tsx'
      - 'src/components/ui/collapsible.tsx'
      - 'src/components/ui/command.tsx'
      - 'src/components/ui/context-menu.tsx'
      - 'src/components/ui/dialog.tsx'
      - 'src/components/ui/drawer.tsx'
      - 'src/components/ui/dropdown-menu.tsx'
      - 'src/components/ui/empty.tsx'
      - 'src/components/ui/field.tsx'
      - 'src/components/ui/form.tsx'
      - 'src/components/ui/hover-card.tsx'
      - 'src/components/ui/input.tsx'
      - 'src/components/ui/input-group.tsx'
      - 'src/components/ui/input-otp.tsx'
      - 'src/components/ui/item.tsx'
      - 'src/components/ui/kbd.tsx'
      - 'src/components/ui/label.tsx'
      - 'src/components/ui/menubar.tsx'
      - 'src/components/ui/navigation-menu.tsx'
      - 'src/components/ui/pagination.tsx'
      - 'src/components/ui/popover.tsx'
      - 'src/components/ui/progress.tsx'
      - 'src/components/ui/radio-group.tsx'
      - 'src/components/ui/resizable.tsx'
      - 'src/components/ui/scroll-area.tsx'
      - 'src/components/ui/select.tsx'
      - 'src/components/ui/separator.tsx'
      - 'src/components/ui/sheet.tsx'
      - 'src/components/ui/sidebar.tsx'
      - 'src/components/ui/skeleton.tsx'
      - 'src/components/ui/slider.tsx'
      - 'src/components/ui/sonner.tsx'
      - 'src/components/ui/spinner.tsx'
      - 'src/components/ui/switch.tsx'
      - 'src/components/ui/table.tsx'
      - 'src/components/ui/tabs.tsx'
      - 'src/components/ui/textarea.tsx'
      - 'src/components/ui/toggle.tsx'
      - 'src/components/ui/toggle-group.tsx'
      - 'src/components/ui/tooltip.tsx'
      - 'sync-files.json' # Also trigger if the allowlist itself changes

jobs:
  sync:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' || github.run_number != 1) &&
      !contains(github.event.head_commit.message, 'chore: sync config from template')
    env:
        GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
    steps:
      - name: Checkout template repo
        uses: actions/checkout@v4

      - name: Read registry and sync files
        run: |
          REPOS=$(jq -r '.repos[]' repos.json)
          FILES=$(jq -r '.files[]' sync-files.json)
          BRANCH="sync/template-$(date +'%Y%m%d-%H%M%S')"

          for REPO in $REPOS; do
            echo "→ Syncing to $REPO"

            # Clone the target repo
            git clone https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git target-repo
            cd target-repo

            # Enable auto-merge on the derived repo if not already enabled
            gh repo edit $REPO --enable-auto-merge

            # Create a new branch for the sync PR
            git checkout -b $BRANCH

            # Copy each file from the template into the target repo
            for FILE in $FILES; do
              mkdir -p $(dirname $FILE)
              cp ../$FILE $FILE
            done

            # Commit and push if there are changes
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .

            if git diff --cached --quiet; then
              echo "No changes for $REPO, skipping."
            else
              git commit -m "chore: sync config from template"
              git push origin $BRANCH

              # Open a PR and immediately auto-merge it
              gh pr create \
                --repo $REPO \
                --head $BRANCH \
                --base main \
                --title "chore: sync config updates from template" \
                --body "Automated sync from the template repository." \

              # Ensure auto-merge is enabled on the repo before enabling it on the PR
              gh repo edit $REPO --enable-auto-merge

              gh pr merge $BRANCH \
                --repo $REPO \
                --squash \
                --delete-branch
            fi

            cd ..
            rm -rf target-repo
          done